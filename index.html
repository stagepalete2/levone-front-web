<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Levone" />

    <meta name="theme-color" content="#000000" />

    <link rel="icon" type="image/png" href="/LevCoin.png" />
    <link rel="apple-touch-icon" href="/LevCoin.png" />

    <link rel="manifest" href="/manifest.json" />

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>Levone App</title>

    <style>
      /* iOS Safari: hide bottom bar and use safe areas */
      html, body {
        height: 100%;
        overflow: hidden;
        /* Use env() for safe area insets on iOS */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      #root {
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* Force iOS Safari to go into minimal UI mode */
      @supports (-webkit-touch-callout: none) {
        html {
          height: -webkit-fill-available;
        }
        body {
          min-height: -webkit-fill-available;
          min-height: 100dvh;
        }
        #root {
          min-height: -webkit-fill-available;
          min-height: 100dvh;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // iOS Safari: scroll down to hide address/search bars
      (function() {
        if (/iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream) {
          // Wait for page load, then scroll to trigger minimal UI
          window.addEventListener('load', function() {
            setTimeout(function() {
              window.scrollTo(0, 1);
            }, 100);
          });
        }
      })();
    </script>
  </body>
</html>
